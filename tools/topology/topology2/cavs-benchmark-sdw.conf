Define {
	PLATFORM 		"none"
	SDW_JACK_OUT_STREAM	'SDW0-Playback'
	SDW_JACK_IN_STREAM	'SDW0-Capture'
	SDW_JACK_OUT_BE_ID	0
	SDW_JACK_IN_BE_ID	1
	NUM_SDW_AMP_LINKS 	0
	SDW_DMIC 		0
	SDW_JACK 		true
	PASSTHROUGH		false
	SDW_JACK_CAPTURE_CH 	2
	SDW_LINK_VALID_BITS	24
	ANALOG_PLAYBACK_PCM	'Analog Playback'
	ANALOG_CAPTURE_PCM	'Analog Capture'
}

# override defaults with platform-specific config
IncludeByKey.PLATFORM {
	"mtl"	"platform/intel/mtl.conf"
	"lnl"	"platform/intel/lnl.conf"
	"ptl"	"platform/intel/ptl.conf"
}

Define {
	JACK_PLAYBACK_PCM_NAME	"Jack Out"
	JACK_CAPTURE_PCM_NAME	"Jack In"
	JACK_RATE		48000
}

Define {
	BENCH_MICSEL_PARAMS	"default"
}

#
# List of all DAIs
#
Object.Dai.ALH [
	{
		dai_index 0
		id 		$SDW_JACK_OUT_BE_ID
		direction	"playback"
		name		$SDW_JACK_OUT_STREAM
		default_hw_conf_id	0
		rate			$JACK_RATE
		channels		2

		Object.Base.hw_config.1 {
			id	0
			name	"ALH2"
		}
	}
	{
		dai_index 10
		id 		$SDW_JACK_IN_BE_ID
		direction	"capture"
		name		$SDW_JACK_IN_STREAM
		default_hw_conf_id	0
		rate			$JACK_RATE
		channels		2

		Object.Base.hw_config.1 {
			id	0
			name	"ALH3"
		}
	}
]

Object.PCM.pcm [
	{
		name	"$JACK_PLAYBACK_PCM_NAME"
		id 0
		direction	"playback"
		Object.Base.fe_dai.1 {
			name	"$JACK_PLAYBACK_PCM_NAME"
		}

		Object.PCM.pcm_caps.1 {
			name $ANALOG_PLAYBACK_PCM
			formats 'S16_LE,S24_LE,S32_LE'
			rates "8000,11025,16000,22050,32000,44100,48000,64000,88200,96000,176400,192000"
			channels_min	1
			channels_max	8
		}
	}
	{
		name	"$JACK_CAPTURE_PCM_NAME"
		id 1
		direction	"capture"
		Object.Base.fe_dai.1 {
			name	"$JACK_CAPTURE_PCM_NAME"
		}

		Object.PCM.pcm_caps.1 {
			name $ANALOG_CAPTURE_PCM
			formats 'S16_LE,S24_LE,S32_LE'
			rates "8000,11025,16000,22050,32000,44100,48000,64000,88200,96000,176400,192000"
			channels_min	1
			channels_max	8
		}
	}
]

Object.Widget.micsel.1 {
	index 1
	num_input_audio_formats 7
	num_output_audio_formats 1

	Object.Base.input_audio_format [
		{
			in_bit_depth		32
			in_valid_bit_depth	32
			in_channels		1
			in_ch_cfg		$CHANNEL_CONFIG_MONO
			in_ch_map		$CHANNEL_MAP_MONO
		}
		{
			in_bit_depth		32
			in_valid_bit_depth	32
			in_channels		2
			in_ch_cfg		$CHANNEL_CONFIG_STEREO
			in_ch_map		$CHANNEL_MAP_STEREO
		}
		{
			in_bit_depth		32
			in_valid_bit_depth	32
			in_channels		3
			in_ch_cfg		$CHANNEL_CONFIG_2_POINT_1
			in_ch_map		$CHANNEL_MAP_2_POINT_1
		}
		{
			in_bit_depth		32
			in_valid_bit_depth	32
			in_channels		4
			in_ch_cfg		$CHANNEL_CONFIG_3_POINT_1
			in_ch_map		$CHANNEL_MAP_3_POINT_1
		}
		{
			in_bit_depth		32
			in_valid_bit_depth	32
			in_channels		5
			in_ch_cfg		$CHANNEL_CONFIG_5_POINT_0
			in_ch_map		$CHANNEL_MAP_5_POINT_0
		}
		{
			in_bit_depth		32
			in_valid_bit_depth	32
			in_channels		6
			in_ch_cfg		$CHANNEL_CONFIG_5_POINT_1
			in_ch_map		$CHANNEL_MAP_5_POINT_1
		}
		{
			in_bit_depth		32
			in_valid_bit_depth	32
			in_channels		8
			in_ch_cfg		$CHANNEL_CONFIG_7_POINT_1
			in_ch_map		$CHANNEL_MAP_7_POINT_1
		}
	]
	Object.Base.output_audio_format [
		{
			out_bit_depth		32
			out_valid_bit_depth	32
			out_channels		2
			out_ch_cfg		$CHANNEL_CONFIG_STEREO
			out_ch_map		$CHANNEL_MAP_STEREO
		}
	]

	#<include/bench/micsel_controls_playback.conf>
	Object.Control {
		bytes."1" {
			name '$ANALOG_PLAYBACK_PCM MICSEL bytes'
			IncludeByKey.BENCH_MICSEL_PARAMS {
				"passthrough" "include/components/micsel/passthrough.conf"
				"default" "include/components/micsel/downmix_71_to_stereo_with_lfe.conf"
			}
		}
	}
}

