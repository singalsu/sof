Object.Widget {
	alh-copier [
		{
			stream_name $SDW_JACK_OUT_STREAM
			node_type $ALH_LINK_OUTPUT_CLASS
			index 1
			type dai_in
			direction	playback
			num_input_pins 1
			num_input_audio_formats 3
