Object.PCM.pcm [
	{
		name	"$SSP0_PCM_NAME"
		id $SSP0_PCM_ID
		direction	"duplex"
		Object.Base.fe_dai.1 {
			name	"$SSP0_PCM_NAME"
		}

		Object.PCM.pcm_caps.1 {
			direction	"playback"
			name "SSP0 Playback"
			formats 'S16_LE,S24_LE,S32_LE'
		}

		Object.PCM.pcm_caps.2 {
			direction	"capture"
			name "SSP0 Capture"
			formats 'S16_LE,S24_LE,S32_LE'
		}
	}
	{
		name	"$SSP2_PCM_NAME"
		id 2
		direction	"duplex"
		Object.Base.fe_dai.1 {
			name	"$SSP2_PCM_NAME"
		}

		Object.PCM.pcm_caps.1 {
			direction	"playback"
			name "SSP2 Playback"
			formats 'S16_LE,S24_LE,S32_LE'
		}

		Object.PCM.pcm_caps.2 {
			direction	"capture"
			name "SSP2 Capture"
			formats 'S16_LE,S24_LE,S32_LE'
		}
	}
]

Object.Base.route [
        {
                source	"dai-copier.SSP.NoCodec-0.capture"
                sink	"host-copier.0.capture"
        }
        {
                source	"host-copier.0.playback"
                sink	"drc.0.1"
        }
        {
                source	"drc.0.1"
                sink	"dai-copier.SSP.NoCodec-0.playback"
        }
	{
		source	"dai-copier.SSP.NoCodec-2.capture"
		sink	"host-copier.2.capture"
	}
        {
                source	"host-copier.2.playback"
                sink	"drc.2.1"
        }
        {
                source	"drc.2.1"
                sink	"dai-copier.SSP.NoCodec-2.playback"
        }
]

# There is pinmux conflict between SSP1 and DMIC on MTL RVP,
# so include SSP1 pipelines conditionally.
IncludeByKey.SSP1_ENABLED {
	"true" {
		Object.Dai.SSP [
			{
				id 		1
				dai_index	1
				direction	"duplex"
				name		NoCodec-1
				default_hw_conf_id	0
				sample_bits		32
				quirks			"lbm_mode"
				io_clk		$MCLK

				Object.Base.hw_config.1 {
					name	"SSP1"
					id	0
					bclk_freq	3072000
					tdm_slot_width	32
					# TODO: remove this. Needs alsaptlg change.
					Object.Base.link_config.1 {
						clock_source	1
					}
				}
			}
		]

		Object.Pipeline.io-gateway-capture [
			{
				index		10
				direction	capture

				Object.Widget.dai-copier."1" {
					dai_index	1
					dai_type	"SSP"
					type		dai_out
					copier_type	"SSP"
					stream_name	"NoCodec-1"
					node_type	$I2S_LINK_INPUT_CLASS
					Object.Base.audio_format.1 {
						in_bit_depth		32
						in_valid_bit_depth	32
						out_bit_depth		32
						out_valid_bit_depth	32
					}
				}
			}
		]

		Object.Pipeline.host-gateway-capture [
			{
				index 	9

				Object.Widget.host-copier.1 {
					stream_name 'SSP1 Capture'
					pcm_id 1
				}
			}
		]

                Object.Widget.drc [
                        {
                                index 1
                                name "drc.1.1"

                                num_input_audio_formats 1
                                num_output_audio_formats 1

                                # 24-bit 48KHz 2ch
                                Object.Base.audio_format [
                                        {
                                                in_bit_depth		32
                                                in_valid_bit_depth	24
                                                out_bit_depth		32
                                                out_valid_bit_depth	24
                                        }
                                ]

                                Object.Control.bytes."1" {
                                        name "DRC_bytes_control_1"
                                        IncludeByKey.EFX_DRC_PARAMS {
                                                "passthrough" "include/components/drc/passthrough.conf"
                                                "default"     "include/components/drc/default.conf"
                                                "enabled"     "include/components/drc/enabled.conf"
                                        }
                                }
                        }
                ]
                Object.Pipeline.io-gateway [
                        {
                                index	4
                                direction	playback

                                Object.Widget.dai-copier.1 {
                                        dai_index 1
                                        dai_type "SSP"
                                        copier_type "SSP"
                                        stream_name "NoCodec-1"
                                        node_type $I2S_LINK_OUTPUT_CLASS
                                        num_input_audio_formats 3
                                        Object.Base.input_audio_format [
                                                {
                                                        in_bit_depth            16
                                                        in_valid_bit_depth      16
                                                }
                                                {
                                                        in_bit_depth            32
                                                        in_valid_bit_depth      24
                                                }
                                                {
                                                        in_bit_depth            32
                                                        in_valid_bit_depth      32
                                                }
                                        ]
                                        num_output_audio_formats 3
                                        Object.Base.output_audio_format [
                                                {
                                                        out_bit_depth           16
                                                        out_valid_bit_depth     16
                                                }
                                                {
                                                        out_bit_depth           32
                                                        out_valid_bit_depth     24
                                                }
                                                {
                                                        out_bit_depth           32
                                                        out_valid_bit_depth     32
                                                }
                                        ]
                                }
                        }
                ]
                Object.Pipeline.host-gateway-playback [
                        {
                                index	3
                                Object.Widget.host-copier.1 {
                                        stream_name 'SSP1 Playback'
                                        pcm_id 1
                                        num_input_audio_formats 3
                                        Object.Base.input_audio_format [
                                                {
                                                        in_bit_depth            16
                                                        in_valid_bit_depth      16
                                                }
                                                {
                                                        in_bit_depth            32
                                                        in_valid_bit_depth      24
                                                }
                                                {
                                                        in_bit_depth            32
                                                        in_valid_bit_depth      32
                                                }
                                        ]
                                        num_output_audio_formats 1
                                        Object.Base.output_audio_format [
                                                {
                                                        out_bit_depth           32
                                                        out_valid_bit_depth     24
                                                }
                                        ]
                                }
                        }
                ]

		Object.PCM.pcm [
			{
				name	"$SSP1_PCM_NAME"
				id 1
				direction	"duplex"
				Object.Base.fe_dai.1 {
					name	"$SSP1_PCM_NAME"
				}

				Object.PCM.pcm_caps.1 {
					direction	"playback"
					name "SSP1 Playback"
					formats 'S16_LE,S24_LE,S32_LE'
				}

				Object.PCM.pcm_caps.2 {
					direction	"capture"
					name "SSP1 Capture"
					formats 'S16_LE,S24_LE,S32_LE'
				}
			}
		]

                Object.Base.route [
                        {
                                source	"host-copier.1.playback"
                                sink	"drc.1.1"
                        }
                        {
                                source	"drc.1.1"
                                sink	"dai-copier.SSP.NoCodec-1.playback"
                        }
			{
				source	"dai-copier.SSP.NoCodec-1.capture"
				sink	"host-copier.1.capture"
			}
