Object.Widget.drc [
        {
                index 1
                name "drc.0.1"

                num_input_audio_formats 1
                num_output_audio_formats 1

                # 16-bit 48KHz 2ch
                Object.Base.audio_format [
                        {
                                in_bit_depth		16
                                in_valid_bit_depth	16
                                out_bit_depth		16
                                out_valid_bit_depth	16
                        }
                ]

                Object.Control.bytes."1" {
                        name "DRC_bytes_control_0"
                        IncludeByKey.EFX_DRC_PARAMS {
                                "passthrough" "include/components/drc/passthrough.conf"
                                "default"     "include/components/drc/default.conf"
                                "enabled"     "include/components/drc/enabled.conf"
                        }
                }
        }
        {
                index 5
                name "drc.2.1"

                num_input_audio_formats 1
                num_output_audio_formats 1

                # 32-bit 48KHz 2ch
                Object.Base.audio_format [
                        {
                                in_bit_depth		32
                                in_valid_bit_depth	32
                                out_bit_depth		32
                                out_valid_bit_depth	32
                        }
                ]

                Object.Control.bytes."1" {
                        name "DRC_bytes_control_2"
                        IncludeByKey.EFX_DRC_PARAMS {
                                "passthrough" "include/components/drc/passthrough.conf"
                                "default"     "include/components/drc/default.conf"
                                "enabled"     "include/components/drc/enabled.conf"
                        }
                }
        }
]


